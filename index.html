<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2nd part</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Lato:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #e8c84a;
      --gold-dim:   rgba(232,200,74,0.45);
      --cream:      rgba(255,248,228,0.93);
      --cream-soft: rgba(255,248,228,0.62);
      --deep-sea:   #06111f;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep-sea);
      font-family: 'Lato', sans-serif;
    }

    /* ═══════════════════════════════════════
       SHARED OCEAN CANVAS (behind both pages)
    ═══════════════════════════════════════ */
    #ocean-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════
       PAGE 1 — OPENING
    ═══════════════════════════════════════ */
    #page-open {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 1.4s cubic-bezier(.4,0,.2,1),
                  transform 1.4s cubic-bezier(.4,0,.2,1);
    }
    #page-open.hidden {
      opacity: 0; pointer-events: none; transform: scale(1.05);
    }

    /* background image */
    .bg-open {
      position: absolute; inset: 0;
      background: url('opening_onepiece_wallpaper.webp') center/cover no-repeat;
      filter: brightness(0.45) saturate(0.9);
    }
    /* layered vignettes */
    .bg-open::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%,
        transparent 20%, rgba(4,10,30,0.72) 100%);
    }
    .bg-open::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(4,10,30,0.55) 0%,
        transparent 35%,
        transparent 65%,
        rgba(4,10,30,0.75) 100%);
    }

    /* top title */
    .open-title {
      position: relative; z-index: 2;
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(232,200,74,0.6);
      margin-bottom: 42px;
      animation: titleFadeIn 2s ease forwards, titleShimmer 4s ease-in-out 2s infinite;
      opacity: 0;
    }
    @keyframes titleFadeIn {
      from { opacity:0; transform: translateY(-12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes titleShimmer {
      0%, 100% { text-shadow: 0 0 20px rgba(232,200,74,0.45); }
      50%       { text-shadow: 0 0 40px rgba(232,200,74,0.9), 0 0 80px rgba(232,200,74,0.3); }
    }

    /* compass container */
    .compass-wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 34px;
      animation: compassFloat 4s ease-in-out infinite alternate;
    }
    @keyframes compassFloat {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }

    /* glow ring behind the compass image */
    .compass-glow {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .compass-glow::before {
      content: '';
      position: absolute;
      width: 110%; height: 110%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,200,74,0.28) 0%, transparent 70%);
      animation: glowPulse 2.8s ease-in-out infinite alternate;
    }
    .compass-glow::after {
      content: '';
      position: absolute;
      width: 130%; height: 130%;
      border-radius: 50%;
      border: 1px solid rgba(232,200,74,0.2);
      animation: ringExpand 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }
    @keyframes ringExpand {
      0%   { transform: scale(0.9); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .compass-img {
      width: clamp(180px, 32vw, 260px);
      height: auto;
      filter: drop-shadow(0 6px 30px rgba(232,200,74,0.5))
              drop-shadow(0 2px 8px rgba(0,0,0,0.7));
      animation: compassGlow 3s ease-in-out infinite alternate;
    }
    @keyframes compassGlow {
      from { filter: drop-shadow(0 6px 24px rgba(232,200,74,0.4)) drop-shadow(0 2px 8px rgba(0,0,0,0.7)); }
      to   { filter: drop-shadow(0 6px 40px rgba(232,200,74,0.85)) drop-shadow(0 2px 8px rgba(0,0,0,0.7)); }
    }

    /* tap hint */
    .tap-hint {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .tap-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.45em;
      color: var(--cream);
      text-transform: uppercase;
      animation: blinkFade 2.4s ease-in-out infinite;
    }
    @keyframes blinkFade {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.95; }
    }
    /* animated chevron */
    .tap-chevron {
      display: flex; flex-direction: column; gap: 4px; align-items: center;
    }
    .chev {
      width: 18px; height: 9px;
      border-right: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
      transform: rotate(45deg);
      animation: chevDrop 2.4s ease-in-out infinite;
    }
    .chev:nth-child(2) { animation-delay: 0.2s; opacity: 0.6; }
    .chev:nth-child(3) { animation-delay: 0.4s; opacity: 0.3; }
    @keyframes chevDrop {
      0%, 100% { opacity: 0; transform: rotate(45deg) translateY(-4px); }
      50%       { opacity: 1; transform: rotate(45deg) translateY(4px); }
    }

    /* ripple on click */
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: rgba(232,200,74,0.35);
      pointer-events: none;
      transform: scale(0);
      animation: rippleOut 0.9s ease-out forwards;
      z-index: 20;
    }
    @keyframes rippleOut {
      to { transform: scale(18); opacity: 0; }
    }

    /* ═══════════════════════════════════════
       PAGE 2 — MESSAGE
    ═══════════════════════════════════════ */
    #page-msg {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 1.6s ease 0.5s;
      padding: 20px;
    }
    #page-msg.visible {
      opacity: 1; pointer-events: all;
    }

    .bg-msg {
      position: absolute; inset: 0;
      background: url('luffy_background_theme.jpg') center/cover no-repeat;
      filter: brightness(0.32) saturate(0.75);
      transition: filter 2s ease;
    }
    #page-msg.visible .bg-msg {
      filter: brightness(0.42) saturate(0.85);
    }
    .bg-msg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(4,10,30,0.5) 0%,
        rgba(4,10,30,0.1) 40%,
        rgba(4,10,30,0.6) 100%);
    }

    /* LUFFY */
    .luffy-wrap {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }
    .luffy-halo {
      position: absolute;
      width: 120%; height: 120%;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,200,80,0.18) 0%, transparent 68%);
      animation: haloBreath 4s ease-in-out infinite alternate;
    }
    @keyframes haloBreath {
      from { transform: scale(0.95); opacity: 0.6; }
      to   { transform: scale(1.08); opacity: 1; }
    }
    .luffy-img {
      position: relative;
      width: clamp(150px, 28vw, 210px);
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.7))
              drop-shadow(0 0 20px rgba(255,200,80,0.25));
      opacity: 0;
      transform: translateY(24px) scale(0.94);
      transition: opacity 1.1s ease 0.7s, transform 1.1s ease 0.7s;
    }
    #page-msg.visible .luffy-img {
      opacity: 1; transform: translateY(0) scale(1);
      animation: luffyBob 5s ease-in-out 1.8s infinite alternate;
    }
    @keyframes luffyBob {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    /* CARD */
    .card {
      position: relative; z-index: 2;
      margin-top: 22px;
      padding: clamp(20px,4vw,30px) clamp(22px,5vw,44px);
      max-width: min(440px, 90vw);
      width: 100%;
      background: rgba(10,18,40,0.55);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(232,200,74,0.18);
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45),
                  inset 0 1px 0 rgba(255,255,255,0.07);
      overflow: hidden;
    }
    /* shimmer sweep on card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(105deg,
        transparent 40%,
        rgba(255,248,200,0.06) 50%,
        transparent 60%);
      animation: cardShimmer 5s ease-in-out 3s infinite;
    }
    @keyframes cardShimmer {
      0%   { left: -100%; }
      100% { left: 160%; }
    }

    .line {
      display: block;
      font-size: clamp(0.88rem, 2.3vw, 1.06rem);
      font-weight: 300;
      color: transparent;
      line-height: 1.95;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(10px);
      transition: color 0.8s ease, opacity 0.8s ease, transform 0.8s ease;
    }
    /* staggered line reveals */
    #page-msg.visible .line:nth-child(1) { color:var(--cream); opacity:1; transform:translateY(0); transition-delay:1.0s; }
    #page-msg.visible .line:nth-child(2) { color:var(--cream); opacity:1; transform:translateY(0); transition-delay:1.4s; }
    #page-msg.visible .line:nth-child(3) { color:var(--cream); opacity:1; transform:translateY(0); transition-delay:1.8s; }
    #page-msg.visible .line:nth-child(5) { color:var(--cream-soft); opacity:1; transform:translateY(0); transition-delay:2.3s; }
    #page-msg.visible .line:nth-child(6) { color:var(--cream-soft); opacity:1; transform:translateY(0); transition-delay:2.7s; font-style:italic; }
    #page-msg.visible .line:nth-child(7) {
      color: var(--gold); opacity:1; transform:translateY(0); transition-delay:3.1s;
      font-weight: 400; font-size: clamp(0.95rem,2.5vw,1.12rem);
      text-shadow: 0 0 14px rgba(232,200,74,0.4);
    }

    .divider {
      display: block;
      height: 1px;
      margin: 14px auto;
      width: 0%;
      background: linear-gradient(to right,
        transparent, rgba(232,200,74,0.5), transparent);
      transition: width 1.2s ease 2.1s;
    }
    #page-msg.visible .divider { width: 65%; }

    /* FLOATING PARTICLES */
    .particles {
      position: absolute; inset: 0;
      overflow: hidden; pointer-events: none; z-index: 1;
    }
    .pt {
      position: absolute; border-radius: 50%;
      animation: ptRise linear infinite;
    }
    @keyframes ptRise {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.5; }
      100% { transform: translateY(-12vh) scale(1.2); opacity: 0; }
    }

    /* OCEAN WAVES (canvas overlay on page 1) */
    #wave-canvas {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 220px;
      pointer-events: none; z-index: 1;
      opacity: 0.35;
    }
  </style>
</head>
<body>

<!-- ── PAGE 1: OPENING ── -->
<div id="page-open">
  <div class="bg-open"></div>
  <canvas id="wave-canvas"></canvas>

  <p class="open-title">Hope for the best path of life</p>

  <div class="compass-wrap">
    <div class="compass-glow">
      <img src="compass.png" alt="Eternal Pose" class="compass-img" id="compassImg"/>
    </div>

    <div class="tap-hint">
      <span class="tap-label">Tap to open</span>
      <div class="tap-chevron">
        <div class="chev"></div>
        <div class="chev"></div>
        <div class="chev"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── PAGE 2: MESSAGE ── -->
<div id="page-msg">
  <div class="bg-msg"></div>
  <div class="particles" id="particles"></div>

  <div class="luffy-wrap">
    <div class="luffy-halo"></div>
    <img src="luffy_png.png" alt="Luffy" class="luffy-img"/>
  </div>

  <div class="card">
    <span class="line">You studied.</span>
    <span class="line">You showed up.</span>
    <span class="line">You gave it your best.</span>
    <span class="divider"></span>
    <span class="line">That's already something to be proud of.</span>
  </div>

  <audio id="bgm" src="luffy_voice.mp3" preload="auto"></audio>
</div>

<script>
/* ── WAVE CANVAS ── */
(function() {
  const canvas = document.getElementById('wave-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawWaves() {
    ctx.clearRect(0, 0, W, H);
    const waves = [
      { amp:18, freq:0.012, speed:0.018, y:0.35, color:'rgba(60,140,210,0.45)', offset:0 },
      { amp:14, freq:0.018, speed:0.025, y:0.55, color:'rgba(40,110,180,0.35)', offset:2 },
      { amp:10, freq:0.022, speed:0.030, y:0.72, color:'rgba(20, 80,160,0.5)',  offset:4 },
    ];
    waves.forEach(w => {
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 3) {
        const y = H * w.y + Math.sin(x * w.freq + t * w.speed + w.offset) * w.amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = w.color;
      ctx.fill();
    });
    t++;
    requestAnimationFrame(drawWaves);
  }
  drawWaves();
})();

/* ── PARTICLES on page 2 ── */
(function() {
  const wrap = document.getElementById('particles');
  const colors = [
    'rgba(232,200,74,0.7)',
    'rgba(255,230,130,0.5)',
    'rgba(180,220,255,0.45)',
    'rgba(255,255,255,0.4)',
  ];
  for (let i = 0; i < 38; i++) {
    const el = document.createElement('div');
    el.className = 'pt';
    const size  = Math.random() * 5 + 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${color};
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*12}s;
      opacity:0;
    `;
    wrap.appendChild(el);
  }
})();

/* ── RIPPLE on tap ── */
function spawnRipple(e) {
  const r   = document.createElement('div');
  r.className = 'ripple';
  const x   = e.clientX ?? window.innerWidth / 2;
  const y   = e.clientY ?? window.innerHeight / 2;
  const sz  = 48;
  r.style.cssText = `
    left:${x - sz/2}px; top:${y - sz/2}px;
    width:${sz}px; height:${sz}px;
  `;
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* ── COMPASS wobble on hover (tease) ── */
(function() {
  const img = document.getElementById('compassImg');
  if (!img) return;
  let ticking = false;
  document.getElementById('page-open').addEventListener('mousemove', e => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const rect = img.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const dx = (e.clientX - cx) / (window.innerWidth  / 2);
      const dy = (e.clientY - cy) / (window.innerHeight / 2);
      img.style.transform = `perspective(600px) rotateY(${dx*10}deg) rotateX(${-dy*8}deg)`;
      ticking = false;
    });
  });
  document.getElementById('page-open').addEventListener('mouseleave', () => {
    img.style.transform = '';
  });
})();

/* ── PAGE TRANSITION ── */
const pageOpen = document.getElementById('page-open');
const pageMsg  = document.getElementById('page-msg');
const bgm      = document.getElementById('bgm');

pageOpen.addEventListener('click', e => {
  spawnRipple(e);
  setTimeout(() => {
    pageOpen.classList.add('hidden');
    setTimeout(() => {
      pageMsg.classList.add('visible');
      bgm.play().catch(() => {});
    }, 500);
  }, 200);
});
</script>
</body>
</html>
